<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusLink | Placement Interaction System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .pastel-bg { background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#faf9f8] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState(null);
            const [activeTab, setActiveTab] = useState("Dashboard");

            // --- 1. LOGIN SCREEN ---
            const LoginPage = () => {
                const [selectedRole, setSelectedRole] = useState("Student");
                
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 pastel-bg">
                        <div className="bg-white/80 backdrop-blur-md p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white">
                            <div className="text-center mb-10">
                                <div className="inline-block p-3 rounded-2xl bg-indigo-50 mb-4">
                                    <div className="w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center text-white font-black text-2xl">C</div>
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-900">CampusLink</h1>
                                <p className="text-slate-500 mt-2 font-medium">Placement Management System</p>
                            </div>

                            <div className="space-y-6">
                                <div className="grid grid-cols-2 gap-2 p-1 bg-slate-100 rounded-2xl">
                                    {["Student", "Employer", "Officer", "Admin"].map(role => (
                                        <button 
                                            key={role}
                                            onClick={() => setSelectedRole(role)}
                                            className={`py-2 text-xs font-bold rounded-xl transition-all ${selectedRole === role ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}
                                        >
                                            {role}
                                        </button>
                                    ))}
                                </div>

                                <button 
                                    onClick={() => { setUserRole(selectedRole); setIsLoggedIn(true); }}
                                    className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl shadow-lg transition-transform active:scale-95"
                                >
                                    Enter as {selectedRole}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- 2. MAIN DASHBOARD ---
            const DashboardContent = () => (
                <div className="animate-in">
                    <header className="mb-10">
                        <h2 className="text-4xl font-extrabold text-slate-900">Welcome, {userRole}</h2>
                        <p className="text-lg text-slate-500 font-medium">University Placement Portal • 2026 Session</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                            <span className="text-indigo-500 font-bold text-xs uppercase">Active Jobs</span>
                            <h3 className="text-4xl font-black text-slate-900 mt-2">128</h3>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                            <span className="text-rose-500 font-bold text-xs uppercase">Pending Apps</span>
                            <h3 className="text-4xl font-black text-slate-900 mt-2">45</h3>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                            <span className="text-emerald-500 font-bold text-xs uppercase">Placed Students</span>
                            <h3 className="text-4xl font-black text-slate-900 mt-2">840</h3>
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <h3 className="text-xl font-bold mb-6">Recent Postings</h3>
                        <div className="space-y-4">
                            {["Google", "Microsoft", "Amazon"].map((company, i) => (
                                <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow-sm">🏢</div>
                                        <div>
                                            <h4 className="font-bold text-slate-800">{company}</h4>
                                            <p className="text-sm text-slate-500">Software Engineering Role</p>
                                        </div>
                                    </div>
                                    <button className="text-sm font-bold text-indigo-600 bg-white px-4 py-2 rounded-xl shadow-sm">View Details</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (!isLoggedIn) return <LoginPage />;

            return (
                <div className="min-h-screen">
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 px-8 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-white font-black">C</div>
                                <h1 className="text-xl font-bold text-slate-900">CampusLink</h1>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl">
                                {["Dashboard", "Jobs", "Applications"].map(tab => (
                                    <button 
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === tab ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => setIsLoggedIn(false)} className="text-xs font-bold text-rose-500 hover:bg-rose-50 px-3 py-1.5 rounded-lg">Logout</button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-8 md:p-12">
                        {activeTab === "Dashboard" ? <DashboardContent /> : (
                            <div className="py-20 text-center">
                                <h2 className="text-2xl font-bold text-slate-300">{activeTab} module is coming soon!</h2>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
